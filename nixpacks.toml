[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.bcmath", "php82Extensions.ctype"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
